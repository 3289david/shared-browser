<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Shared Browser</title>
  <script>
    // GitHub Pages SPA routing hack:
    // Redirect /ROOMCODE → /?room=ROOMCODE so index.html handles it
    const path = window.location.pathname;
    const match = path.match(/^\/([A-Z0-9]{4,8})$/i);
    if (match) {
      window.location.replace('/?room=' + match[1].toUpperCase());
    } else {
      window.location.replace('/');
    }
  </script>
</head>
<body></body>
</html>
