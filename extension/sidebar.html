<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Shared Browser</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#0d0d1a;--bg2:#13132a;--bg3:#1a1a35;
  --border:#252545;--text:#e2e8f0;--dim:#8892b0;--muted:#4a5168;
  --accent:#6366f1;--accent2:#8b5cf6;
}
html,body{height:100%;overflow:hidden;background:var(--bg);color:var(--text);font-family:system-ui,-apple-system,sans-serif;font-size:13px;}

/* ── Header ── */
.hd{
  display:flex;align-items:center;gap:8px;padding:10px 12px;
  background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;
}
.hd-logo{width:24px;height:24px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:6px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.hd-logo svg{width:14px;height:14px;}
.hd-title{font-weight:700;font-size:13px;color:#fff;flex:1;}
.hd-code{font-family:monospace;font-size:11px;color:#a5b4fc;background:rgba(99,102,241,.15);padding:2px 8px;border-radius:4px;cursor:pointer;letter-spacing:1px;border:1px solid rgba(99,102,241,.25);}
.hd-code:hover{background:rgba(99,102,241,.25);}

/* ── Share row ── */
.share-row{
  display:flex;align-items:center;gap:6px;padding:8px 12px;
  background:rgba(99,102,241,.06);border-bottom:1px solid var(--border);flex-shrink:0;
}
.share-link{flex:1;font-size:11px;color:#a5b4fc;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.copy-btn{padding:4px 10px;background:var(--accent);border:none;border-radius:5px;color:#fff;font-size:11px;font-weight:600;cursor:pointer;flex-shrink:0;}
.copy-btn:hover{opacity:.85;}

/* ── Tabs ── */
.tabs{display:flex;background:var(--bg2);border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{flex:1;padding:8px 2px;border:none;background:none;color:var(--muted);font-size:11px;font-weight:600;cursor:pointer;text-transform:uppercase;letter-spacing:.05em;position:relative;transition:color .15s;}
.tab.on{color:var(--accent);}
.tab.on::after{content:'';position:absolute;bottom:0;left:15%;width:70%;height:2px;background:var(--accent);border-radius:2px 2px 0 0;}
.tab-badge{display:inline-block;width:14px;height:14px;background:var(--accent);color:#fff;border-radius:50%;font-size:9px;line-height:14px;text-align:center;margin-left:3px;}

/* ── Panels ── */
.panel{display:none;flex-direction:column;flex:1;overflow:hidden;}
.panel.on{display:flex;}
.scroll{overflow-y:auto;flex:1;padding:10px;}
.scroll::-webkit-scrollbar{width:3px;}
.scroll::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}

/* ── People panel ── */
.mode-row{display:flex;align-items:center;justify-content:space-between;padding:8px 12px;border-bottom:1px solid var(--border);flex-shrink:0;}
.mode-label{font-size:11px;color:var(--dim);}
.mode-sel{background:var(--bg3);border:1px solid var(--border);color:var(--text);font-size:11px;padding:3px 6px;border-radius:4px;cursor:pointer;}
.member{display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:6px;}
.avatar{width:28px;height:28px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.member-info{flex:1;min-width:0;}
.member-name{font-weight:600;font-size:13px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.member-url{font-size:10px;color:var(--muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px;}
.badge{font-size:9px;padding:1px 5px;border-radius:3px;font-weight:700;}
.badge-l{background:rgba(99,102,241,.2);color:#a5b4fc;}
.badge-y{background:rgba(34,197,94,.15);color:#86efac;}
.icon-btn{width:22px;height:22px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--dim);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.icon-btn:hover{background:var(--accent);border-color:var(--accent);color:#fff;}
.icon-btn svg{width:12px;height:12px;}

/* ── Split row ── */
.split-row{padding:8px 12px;border-top:1px solid var(--border);display:flex;gap:6px;flex-shrink:0;}
.act-btn{flex:1;padding:7px;border:none;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.act-btn:hover{opacity:.85;}
.btn-split{background:var(--bg3);color:var(--dim);border:1px solid var(--border);}
.btn-split.on{background:rgba(245,158,11,.15);color:#fbbf24;border-color:rgba(245,158,11,.3);}
.btn-leave{background:rgba(239,68,68,.15);color:#f87171;border:1px solid rgba(239,68,68,.3);}

/* ── Chat panel ── */
.messages{overflow-y:auto;flex:1;padding:8px;}
.messages::-webkit-scrollbar{width:3px;}
.messages::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px;}
.msg{margin-bottom:10px;}
.msg-hd{display:flex;align-items:center;gap:5px;margin-bottom:2px;}
.msg-av{width:16px;height:16px;border-radius:50%;font-size:8px;font-weight:700;color:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.msg-name{font-size:11px;font-weight:600;}
.msg-time{font-size:10px;color:var(--muted);}
.msg-text{font-size:13px;line-height:1.4;padding-left:21px;word-break:break-word;}

.reactions{display:flex;flex-wrap:wrap;gap:4px;padding:6px 10px;border-top:1px solid var(--border);flex-shrink:0;}
.rxn{padding:3px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;font-size:16px;cursor:pointer;transition:transform .1s;}
.rxn:hover{transform:scale(1.3);}

.chat-input-area{padding:8px;border-top:1px solid var(--border);flex-shrink:0;display:flex;gap:6px;align-items:flex-end;}
.chat-input{flex:1;background:var(--bg2);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:8px 10px;font-size:13px;outline:none;resize:none;max-height:80px;min-height:34px;font-family:inherit;line-height:1.4;}
.chat-input:focus{border-color:var(--accent);}
.chat-input::placeholder{color:var(--muted);}
.send-btn{width:32px;height:32px;background:var(--accent);border:none;border-radius:7px;color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.send-btn:hover{opacity:.85;}
.send-btn svg{width:13px;height:13px;}

/* ── Tools panel ── */
.tools-section{padding:10px;border-bottom:1px solid var(--border);}
.tools-title{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:var(--muted);margin-bottom:8px;}
.tool-row{display:flex;gap:6px;}
.tool-btn{flex:1;padding:8px 6px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;color:var(--dim);font-size:11px;font-weight:600;cursor:pointer;text-align:center;transition:all .15s;}
.tool-btn:hover,.tool-btn.on{border-color:var(--accent);color:#e2e8f0;background:rgba(99,102,241,.1);}
.tool-btn.on{color:#a5b4fc;}
.ann-list{padding:8px;}
.ann-item{display:flex;align-items:flex-start;gap:6px;padding:7px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;margin-bottom:5px;}
.ann-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:3px;}
.ann-body{flex:1;min-width:0;}
.ann-who{font-size:10px;color:var(--muted);margin-bottom:2px;}
.ann-txt{font-size:12px;color:var(--dim);word-break:break-word;}
.ann-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:14px;line-height:1;flex-shrink:0;padding:0 2px;}
.ann-del:hover{color:#f87171;}
.sticky-form{padding:8px;border-top:1px solid var(--border);}
.sticky-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:6px;color:var(--text);padding:7px 9px;font-size:12px;outline:none;resize:none;height:60px;font-family:inherit;margin-bottom:6px;}
.sticky-input:focus{border-color:var(--accent);}
.add-sticky-btn{width:100%;padding:7px;background:var(--accent);border:none;border-radius:6px;color:#fff;font-size:12px;font-weight:600;cursor:pointer;}

/* ── History panel ── */
.hist-item{display:flex;align-items:center;gap:7px;padding:7px 8px;background:var(--bg2);border:1px solid var(--border);border-radius:7px;margin-bottom:5px;}
.hist-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;}
.hist-body{flex:1;min-width:0;}
.hist-url{font-size:11px;color:var(--dim);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.hist-who{font-size:10px;color:var(--muted);margin-top:1px;}
.hist-go{width:20px;height:20px;background:var(--bg3);border:1px solid var(--border);border-radius:4px;color:var(--muted);cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:9px;flex-shrink:0;}
.hist-go:hover{color:var(--accent);border-color:var(--accent);}

.empty{text-align:center;color:var(--muted);font-size:12px;padding:24px 12px;}
</style>
</head>
<body>

<!-- Header -->
<div class="hd">
  <div class="hd-logo">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="white" stroke-width="2"/><circle cx="8.5" cy="10.5" r="2" fill="white"/><circle cx="15.5" cy="10.5" r="2" fill="white"/><path d="M8 15.5 Q12 18 16 15.5" stroke="white" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
  </div>
  <span class="hd-title">Shared Browser</span>
  <span class="hd-code" id="code-el" title="Click to copy link">------</span>
</div>

<!-- Share link row -->
<div class="share-row">
  <span class="share-link" id="share-link-el">b.krl.kr/------</span>
  <button class="copy-btn" id="copy-btn">Copy Link</button>
</div>

<!-- Tabs -->
<div class="tabs">
  <button class="tab on" data-tab="people">People</button>
  <button class="tab" data-tab="chat">Chat <span class="tab-badge" id="chat-badge" style="display:none">0</span></button>
  <button class="tab" data-tab="tools">Tools</button>
  <button class="tab" data-tab="history">History</button>
</div>

<!-- People panel -->
<div class="panel on" id="panel-people">
  <div class="mode-row">
    <span class="mode-label">Mode</span>
    <select class="mode-sel" id="mode-sel">
      <option value="follow">Follow</option>
      <option value="free">Free</option>
      <option value="group">Group</option>
      <option value="presentation">Present</option>
    </select>
  </div>
  <div class="scroll" id="members-list"></div>
  <div class="split-row">
    <button class="act-btn btn-split" id="split-btn">Split</button>
    <button class="act-btn btn-leave" id="leave-btn">Leave Session</button>
  </div>
</div>

<!-- Chat panel -->
<div class="panel" id="panel-chat" style="flex-direction:column;">
  <div class="messages" id="messages"></div>
  <div class="reactions">
    <button class="rxn" data-e="👍">👍</button>
    <button class="rxn" data-e="❤️">❤️</button>
    <button class="rxn" data-e="😂">😂</button>
    <button class="rxn" data-e="🔥">🔥</button>
    <button class="rxn" data-e="👀">👀</button>
    <button class="rxn" data-e="🎉">🎉</button>
  </div>
  <div class="chat-input-area">
    <textarea class="chat-input" id="chat-input" placeholder="Type a message..." rows="1"></textarea>
    <button class="send-btn" id="send-btn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- Tools panel -->
<div class="panel" id="panel-tools">
  <div class="tools-section">
    <div class="tools-title">Annotate</div>
    <div class="tool-row">
      <button class="tool-btn" id="tool-highlight">Highlight</button>
      <button class="tool-btn" id="tool-draw">Draw</button>
    </div>
  </div>
  <div class="sticky-form">
    <div class="tools-title">Sticky Note</div>
    <textarea class="sticky-input" id="sticky-text" placeholder="Write a note..."></textarea>
    <button class="add-sticky-btn" id="add-sticky-btn">Add Note to Page</button>
  </div>
  <div class="tools-title" style="padding:8px 10px 4px">Annotations</div>
  <div class="scroll" id="ann-list"></div>
</div>

<!-- History panel -->
<div class="panel" id="panel-history">
  <div class="scroll" id="history-list"></div>
</div>

<script src="sidebar.js"></script>
</body>
</html>
