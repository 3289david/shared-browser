<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Browser - Sidebar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0f0f17;
      --bg2: #1a1a2e;
      --bg3: #16213e;
      --border: #2d2d44;
      --text: #e2e8f0;
      --text-muted: #64748b;
      --text-dim: #94a3b8;
      --accent: #6366f1;
      --accent2: #8b5cf6;
    }

    html, body { height: 100%; overflow: hidden; }

    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 13px;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    .sb-header {
      padding: 10px 14px;
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .sb-logo {
      width: 22px;
      height: 22px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 5px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .sb-logo svg { width: 13px; height: 13px; }

    .sb-title { font-weight: 700; font-size: 13px; color: #fff; flex: 1; }

    .sb-room-id {
      font-family: 'Courier New', monospace;
      font-size: 11px;
      color: #a5b4fc;
      background: rgba(99, 102, 241, 0.15);
      padding: 2px 8px;
      border-radius: 4px;
      letter-spacing: 1px;
      cursor: pointer;
    }

    .sb-room-id:hover { background: rgba(99, 102, 241, 0.25); }

    /* Tabs */
    .sb-tabs {
      display: flex;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sb-tab {
      flex: 1;
      padding: 8px 4px;
      border: none;
      background: none;
      color: var(--text-muted);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      position: relative;
    }

    .sb-tab.active {
      color: var(--accent);
    }

    .sb-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 10%;
      width: 80%;
      height: 2px;
      background: var(--accent);
      border-radius: 2px 2px 0 0;
    }

    .sb-tab-badge {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 14px;
      height: 14px;
      background: var(--accent);
      color: white;
      border-radius: 50%;
      font-size: 9px;
      margin-left: 3px;
    }

    /* Panels */
    .sb-panel { display: none; flex: 1; overflow-y: auto; flex-direction: column; }
    .sb-panel.active { display: flex; }

    /* People Panel */
    .sb-people { padding: 12px; gap: 8px; }

    .sb-mode-bar {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 10px;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .sb-mode-label { font-size: 11px; color: var(--text-muted); }
    .sb-mode-value { font-size: 12px; font-weight: 600; color: #a5b4fc; }

    .sb-mode-select {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      font-size: 11px;
      padding: 3px 6px;
      border-radius: 4px;
      cursor: pointer;
    }

    .sb-member {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .sb-member-avatar {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .sb-member-info { flex: 1; min-width: 0; }
    .sb-member-name { font-weight: 600; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-member-url { font-size: 10px; color: var(--text-muted); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-top: 2px; }

    .sb-member-actions { display: flex; gap: 4px; }

    .sb-icon-btn {
      width: 24px;
      height: 24px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }

    .sb-icon-btn:hover { background: var(--accent); border-color: var(--accent); color: white; }
    .sb-icon-btn svg { width: 12px; height: 12px; }

    .sb-badge {
      font-size: 9px;
      padding: 1px 5px;
      border-radius: 3px;
      font-weight: 600;
    }

    .sb-badge-leader { background: rgba(99, 102, 241, 0.2); color: #a5b4fc; }
    .sb-badge-you { background: rgba(34, 197, 94, 0.15); color: #86efac; }

    /* Chat Panel */
    .sb-chat { overflow: hidden; }

    .sb-messages {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .sb-message {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .sb-message-header {
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .sb-message-avatar {
      width: 18px;
      height: 18px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 9px;
      font-weight: 700;
      color: white;
      flex-shrink: 0;
    }

    .sb-message-name { font-size: 11px; font-weight: 600; }
    .sb-message-time { font-size: 10px; color: var(--text-muted); }

    .sb-message-text {
      font-size: 13px;
      line-height: 1.4;
      color: var(--text);
      padding-left: 24px;
      word-break: break-word;
    }

    .sb-chat-input-area {
      padding: 10px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }

    .sb-chat-input-row {
      display: flex;
      gap: 6px;
      align-items: flex-end;
    }

    .sb-chat-input {
      flex: 1;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      padding: 8px 10px;
      font-size: 13px;
      outline: none;
      resize: none;
      max-height: 80px;
      min-height: 36px;
      line-height: 1.4;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    .sb-chat-input:focus { border-color: var(--accent); }
    .sb-chat-input::placeholder { color: var(--text-muted); }

    .sb-send-btn {
      width: 34px;
      height: 34px;
      background: var(--accent);
      border: none;
      border-radius: 7px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      transition: opacity 0.2s;
    }

    .sb-send-btn:hover { opacity: 0.85; }
    .sb-send-btn svg { width: 14px; height: 14px; }

    /* Annotations Panel */
    .sb-annotations { padding: 12px; gap: 8px; }

    .sb-annotation-tools {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }

    .sb-tool-btn {
      flex: 1;
      padding: 8px 6px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text-dim);
      font-size: 11px;
      cursor: pointer;
      text-align: center;
      transition: all 0.15s;
    }

    .sb-tool-btn:hover { border-color: var(--accent); color: var(--text); }
    .sb-tool-btn.active { border-color: var(--accent); background: rgba(99,102,241,0.1); color: #a5b4fc; }

    .sb-annotation-item {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 10px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
    }

    .sb-annotation-color {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .sb-annotation-body { flex: 1; min-width: 0; }
    .sb-annotation-who { font-size: 10px; color: var(--text-muted); margin-bottom: 2px; }
    .sb-annotation-text { font-size: 12px; line-height: 1.4; color: var(--text-dim); }

    .sb-annotation-del {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      padding: 0;
      font-size: 14px;
      line-height: 1;
      flex-shrink: 0;
    }

    .sb-annotation-del:hover { color: #f87171; }

    /* Reactions bar */
    .sb-reactions-bar {
      display: flex;
      gap: 4px;
      padding: 8px 10px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
      flex-wrap: wrap;
    }

    .sb-reaction-btn {
      padding: 4px 8px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      font-size: 16px;
      cursor: pointer;
      transition: all 0.1s;
      line-height: 1;
    }

    .sb-reaction-btn:hover { transform: scale(1.3); border-color: var(--accent); }

    /* History panel */
    .sb-history { padding: 12px; gap: 6px; }

    .sb-history-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 7px;
    }

    .sb-history-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .sb-history-info { flex: 1; min-width: 0; }
    .sb-history-url { font-size: 11px; color: var(--text-dim); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .sb-history-who { font-size: 10px; color: var(--text-muted); margin-top: 1px; }

    .sb-history-goto {
      width: 22px;
      height: 22px;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 4px;
      color: var(--text-muted);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 10px;
    }

    .sb-history-goto:hover { color: var(--accent); border-color: var(--accent); }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .sb-empty {
      text-align: center;
      color: var(--text-muted);
      font-size: 12px;
      padding: 24px 16px;
    }

    /* Sticky note modal */
    .sb-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    .sb-modal-box {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      width: 260px;
    }

    .sb-modal-title { font-weight: 600; font-size: 14px; margin-bottom: 10px; }

    .sb-modal-input {
      width: 100%;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 8px;
      font-size: 12px;
      outline: none;
      resize: none;
      height: 80px;
      font-family: inherit;
    }

    .sb-modal-input:focus { border-color: var(--accent); }

    .sb-modal-btns { display: flex; gap: 8px; margin-top: 10px; }

    .sb-modal-cancel {
      flex: 1;
      padding: 8px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 12px;
    }

    .sb-modal-ok {
      flex: 1;
      padding: 8px;
      background: var(--accent);
      border: none;
      border-radius: 6px;
      color: white;
      cursor: pointer;
      font-weight: 600;
      font-size: 12px;
    }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <div class="sb-header">
    <div class="sb-logo">
      <svg viewBox="0 0 16 16" fill="none">
        <circle cx="8" cy="8" r="6" stroke="white" stroke-width="1.5"/>
        <circle cx="5.5" cy="7" r="1.2" fill="white"/>
        <circle cx="10.5" cy="7" r="1.2" fill="white"/>
        <path d="M5.5 10.5 Q8 12 10.5 10.5" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="sb-title">Shared Browser</span>
    <span class="sb-room-id" id="room-id" title="Click to copy link">------</span>
  </div>

  <div class="sb-tabs">
    <button class="sb-tab active" data-tab="people">People</button>
    <button class="sb-tab" data-tab="chat">Chat <span class="sb-tab-badge hidden" id="chat-badge">0</span></button>
    <button class="sb-tab" data-tab="annotations">Notes</button>
    <button class="sb-tab" data-tab="history">History</button>
  </div>

  <!-- People Panel -->
  <div class="sb-panel active" id="panel-people">
    <div class="sb-people" style="display:flex;flex-direction:column;">
      <div class="sb-mode-bar">
        <span class="sb-mode-label">Session mode</span>
        <select class="sb-mode-select" id="mode-select">
          <option value="follow">Follow</option>
          <option value="free">Free</option>
          <option value="group">Group</option>
          <option value="presentation">Presentation</option>
        </select>
      </div>

      <div id="members-container"></div>

      <div style="margin-top:auto;padding-top:8px;border-top:1px solid var(--border)">
        <div style="display:flex;gap:6px">
          <button id="split-btn" class="sb-tool-btn" style="flex:1">Split</button>
          <button id="merge-btn" class="sb-tool-btn hidden" style="flex:1">Merge back</button>
          <button id="leave-btn" class="sb-tool-btn" style="flex:1;color:#f87171;border-color:#7f1d1d">Leave</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Chat Panel -->
  <div class="sb-panel" id="panel-chat" style="flex-direction:column;">
    <div class="sb-messages" id="messages-container"></div>
    <div class="sb-reactions-bar" id="reactions-bar">
      <button class="sb-reaction-btn" data-emoji="👍">👍</button>
      <button class="sb-reaction-btn" data-emoji="❤️">❤️</button>
      <button class="sb-reaction-btn" data-emoji="😂">😂</button>
      <button class="sb-reaction-btn" data-emoji="🔥">🔥</button>
      <button class="sb-reaction-btn" data-emoji="👀">👀</button>
      <button class="sb-reaction-btn" data-emoji="🎉">🎉</button>
    </div>
    <div class="sb-chat-input-area">
      <div class="sb-chat-input-row">
        <textarea class="sb-chat-input" id="chat-input" placeholder="Type a message..." rows="1"></textarea>
        <button class="sb-send-btn" id="send-btn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

  <!-- Annotations Panel -->
  <div class="sb-panel" id="panel-annotations">
    <div class="sb-annotations" style="display:flex;flex-direction:column;">
      <div class="sb-annotation-tools">
        <button class="sb-tool-btn active" data-tool="highlight">Highlight</button>
        <button class="sb-tool-btn" data-tool="sticky">Sticky Note</button>
        <button class="sb-tool-btn" data-tool="draw">Draw</button>
      </div>

      <div style="margin-bottom:8px">
        <button id="add-annotation-btn" style="
          width:100%;padding:8px;background:var(--accent);border:none;border-radius:7px;
          color:white;font-size:12px;font-weight:600;cursor:pointer
        ">Add Selected Text as Highlight</button>
      </div>

      <div id="annotations-container"></div>
    </div>
  </div>

  <!-- History Panel -->
  <div class="sb-panel" id="panel-history">
    <div class="sb-history" style="display:flex;flex-direction:column;" id="history-container"></div>
  </div>

  <!-- Sticky Note Modal -->
  <div class="sb-modal hidden" id="sticky-modal">
    <div class="sb-modal-box">
      <div class="sb-modal-title">Add Sticky Note</div>
      <textarea class="sb-modal-input" id="sticky-text" placeholder="Type your note..."></textarea>
      <div class="sb-modal-btns">
        <button class="sb-modal-cancel" id="sticky-cancel">Cancel</button>
        <button class="sb-modal-ok" id="sticky-ok">Add Note</button>
      </div>
    </div>
  </div>

  <script src="sidebar.js"></script>
</body>
</html>
