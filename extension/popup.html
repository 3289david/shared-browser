<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shared Browser</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 320px;
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f17;
      color: #e2e8f0;
      font-size: 14px;
    }

    .header {
      padding: 16px 20px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      border-bottom: 1px solid #2d2d44;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg { width: 16px; height: 16px; }

    .brand { font-size: 15px; font-weight: 700; color: #fff; }
    .brand span { color: #8b5cf6; }

    .content { padding: 20px; }

    .section { margin-bottom: 20px; }

    .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #64748b;
      margin-bottom: 8px;
    }

    .input {
      width: 100%;
      padding: 10px 12px;
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      color: #e2e8f0;
      font-size: 14px;
      outline: none;
      transition: border-color 0.2s;
    }

    .input:focus { border-color: #6366f1; }
    .input::placeholder { color: #475569; }

    .btn {
      width: 100%;
      padding: 11px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn-primary {
      background: linear-gradient(135deg, #6366f1, #8b5cf6);
      color: white;
    }

    .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); }

    .btn-secondary {
      background: #1e293b;
      color: #94a3b8;
      border: 1px solid #2d2d44;
    }

    .btn-secondary:hover { background: #263347; color: #e2e8f0; }

    .btn-danger {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #991b1b;
    }

    .btn-danger:hover { background: #991b1b; }

    .divider {
      text-align: center;
      color: #475569;
      font-size: 12px;
      margin: 12px 0;
      position: relative;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 42%;
      height: 1px;
      background: #2d2d44;
    }

    .divider::before { left: 0; }
    .divider::after { right: 0; }

    .mode-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 12px;
    }

    .mode-btn {
      padding: 10px 8px;
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      text-align: center;
      transition: all 0.2s;
    }

    .mode-btn:hover { border-color: #6366f1; color: #e2e8f0; }
    .mode-btn.active { border-color: #6366f1; background: #1e1e3f; color: #a5b4fc; }

    .mode-btn .mode-icon { font-size: 16px; display: block; margin-bottom: 3px; }
    .mode-btn .mode-name { font-size: 11px; }

    /* Active session view */
    .session-card {
      background: #1a1a2e;
      border: 1px solid #2d2d44;
      border-radius: 10px;
      padding: 14px;
      margin-bottom: 12px;
    }

    .room-id {
      font-size: 22px;
      font-weight: 800;
      letter-spacing: 4px;
      color: #a5b4fc;
      text-align: center;
      font-family: 'Courier New', monospace;
      margin-bottom: 6px;
    }

    .session-meta {
      text-align: center;
      color: #64748b;
      font-size: 12px;
      margin-bottom: 12px;
    }

    .copy-btn {
      width: 100%;
      padding: 8px;
      background: #0f172a;
      border: 1px dashed #3b4170;
      border-radius: 6px;
      color: #8b5cf6;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }

    .copy-btn:hover { background: #1e1b4b; }

    .members-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 12px;
    }

    .member-item {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 8px;
      background: #0f0f17;
      border-radius: 6px;
    }

    .member-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .member-name { font-size: 13px; color: #cbd5e1; flex: 1; }
    .member-badge {
      font-size: 10px;
      padding: 1px 6px;
      border-radius: 3px;
      background: #1e1b4b;
      color: #a5b4fc;
    }

    .mode-indicator {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: #0f172a;
      border-radius: 6px;
      margin-bottom: 10px;
      font-size: 12px;
      color: #94a3b8;
    }

    .mode-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #22c55e;
    }

    .btn-row {
      display: flex;
      gap: 8px;
    }

    .btn-row .btn { flex: 1; }

    .name-input-section { margin-bottom: 16px; }

    .error {
      color: #f87171;
      font-size: 12px;
      margin-top: 8px;
      text-align: center;
    }

    .hidden { display: none !important; }

    #view-idle { }
    #view-active { }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="8" cy="8" r="6" stroke="white" stroke-width="1.5"/>
        <circle cx="5" cy="7" r="1.5" fill="white"/>
        <circle cx="11" cy="7" r="1.5" fill="white"/>
        <path d="M5 10.5 Q8 12.5 11 10.5" stroke="white" stroke-width="1.2" stroke-linecap="round" fill="none"/>
      </svg>
    </div>
    <span class="brand">Shared<span>Browser</span></span>
  </div>

  <!-- Idle State -->
  <div id="view-idle" class="content">
    <div class="section name-input-section">
      <div class="label">Your name</div>
      <input id="name-input" class="input" type="text" placeholder="Enter your name..." maxlength="30">
    </div>

    <div class="section">
      <div class="label">Session Mode</div>
      <div class="mode-grid">
        <button class="mode-btn active" data-mode="follow">
          <span class="mode-icon">&#9654;</span>
          <span class="mode-name">Follow</span>
        </button>
        <button class="mode-btn" data-mode="free">
          <span class="mode-icon">&#10022;</span>
          <span class="mode-name">Free</span>
        </button>
        <button class="mode-btn" data-mode="group">
          <span class="mode-icon">&#11835;</span>
          <span class="mode-name">Group</span>
        </button>
        <button class="mode-btn" data-mode="presentation">
          <span class="mode-icon">&#9635;</span>
          <span class="mode-name">Present</span>
        </button>
      </div>
      <button id="create-btn" class="btn btn-primary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/>
        </svg>
        Start Session
      </button>
    </div>

    <div class="divider">or join existing</div>

    <div class="section">
      <div class="label">Room code</div>
      <input id="join-input" class="input" type="text" placeholder="Enter room code (e.g. AB1C2D)" maxlength="8" style="text-transform:uppercase;letter-spacing:2px">
      <div style="height:8px"></div>
      <button id="join-btn" class="btn btn-secondary">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/><polyline points="10 17 15 12 10 7"/><line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        Join Session
      </button>
      <div id="error-msg" class="error hidden"></div>
    </div>
  </div>

  <!-- Active Session State -->
  <div id="view-active" class="content hidden">
    <div class="session-card">
      <div class="room-id" id="room-id-display">------</div>
      <div class="session-meta" id="session-meta">0 members</div>
      <button class="copy-btn" id="copy-link-btn">Copy invite link</button>
    </div>

    <div class="mode-indicator">
      <div class="mode-dot"></div>
      <span id="mode-display">Follow Mode</span>
      <span style="flex:1"></span>
      <span id="role-badge" style="font-size:10px;padding:1px 6px;background:#1e3a5f;color:#7dd3fc;border-radius:3px">Leader</span>
    </div>

    <div class="section">
      <div class="label">Members</div>
      <div id="members-list" class="members-list"></div>
    </div>

    <div class="btn-row">
      <button id="open-sidebar-btn" class="btn btn-secondary">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <rect x="3" y="3" width="18" height="18" rx="2"/><line x1="15" y1="3" x2="15" y2="21"/>
        </svg>
        Sidebar
      </button>
      <button id="leave-btn" class="btn btn-danger">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        Leave
      </button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
