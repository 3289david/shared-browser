# Nginx reverse proxy for b.krl.kr
# Serves both the landing page and WebSocket API from the same domain.
#
# Setup:
#   cp nginx.conf /etc/nginx/sites-available/shared-browser
#   ln -s /etc/nginx/sites-available/shared-browser /etc/nginx/sites-enabled/
#   certbot --nginx -d b.krl.kr
#   nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name b.krl.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name b.krl.kr;

    ssl_certificate /etc/letsencrypt/live/b.krl.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/b.krl.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket endpoint
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # Everything else (landing page + /ROOMCODE join links + API)
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
