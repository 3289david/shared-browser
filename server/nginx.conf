# Nginx config for api.b.krl.kr
# Place at: /etc/nginx/sites-available/shared-browser
# Enable: ln -s /etc/nginx/sites-available/shared-browser /etc/nginx/sites-enabled/
# SSL: certbot --nginx -d api.b.krl.kr

server {
    listen 80;
    server_name api.b.krl.kr;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name api.b.krl.kr;

    # SSL - managed by certbot
    ssl_certificate /etc/letsencrypt/live/api.b.krl.kr/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/api.b.krl.kr/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # WebSocket upgrade
    location /ws {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
    }

    # REST API
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }
}
